<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" fill="none">
  <defs>
    <linearGradient id="afBg" x1="0" y1="0" x2="600" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#F3F0FF"/>
    </linearGradient>
    <linearGradient id="purpleMain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B61FF"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="purpleBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B61FF"/>
      <stop offset="100%" stop-color="#00A1E0"/>
    </linearGradient>
    <filter id="afShadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0B1120" flood-opacity="0.07"/>
    </filter>
    <filter id="afGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="pulseGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7B61FF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#7B61FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="300" fill="url(#afBg)" rx="8"/>

  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#7B61FF" letter-spacing="0.5">Agentforce: AI-Powered Reasoning</text>

  <!-- Ambient pulse rings -->
  <circle cx="300" cy="158" r="120" fill="url(#pulseGrad)"/>
  <circle cx="300" cy="158" r="85" fill="none" stroke="#7B61FF" stroke-width="0.5" opacity="0.08" stroke-dasharray="4 4"/>
  <circle cx="300" cy="158" r="110" fill="none" stroke="#7B61FF" stroke-width="0.5" opacity="0.05" stroke-dasharray="3 6"/>

  <!-- CENTRAL AI AGENT NODE -->
  <circle cx="300" cy="158" r="44" fill="white" stroke="#7B61FF" stroke-width="2.5" filter="url(#afShadow)"/>
  <circle cx="300" cy="158" r="32" fill="#7B61FF" opacity="0.06"/>
  <!-- AI chip/brain icon -->
  <g transform="translate(300,158)">
    <rect x="-12" y="-12" width="24" height="24" rx="4" fill="none" stroke="#7B61FF" stroke-width="1.8"/>
    <circle cx="0" cy="0" r="4" fill="#7B61FF" opacity="0.3"/>
    <circle cx="0" cy="0" r="2" fill="#7B61FF"/>
    <!-- Pins -->
    <line x1="-6" y1="-12" x2="-6" y2="-17" stroke="#7B61FF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="-12" x2="0" y2="-17" stroke="#7B61FF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6" y1="-12" x2="6" y2="-17" stroke="#7B61FF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-6" y1="12" x2="-6" y2="17" stroke="#7B61FF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="12" x2="0" y2="17" stroke="#7B61FF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6" y1="12" x2="6" y2="17" stroke="#7B61FF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-12" y1="-6" x2="-17" y2="-6" stroke="#7B61FF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-12" y1="0" x2="-17" y2="0" stroke="#7B61FF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-12" y1="6" x2="-17" y2="6" stroke="#7B61FF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12" y1="-6" x2="17" y2="-6" stroke="#7B61FF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12" y1="0" x2="17" y2="0" stroke="#7B61FF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12" y1="6" x2="17" y2="6" stroke="#7B61FF" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <text x="300" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#7B61FF" letter-spacing="0.5">AI AGENT</text>

  <!-- CONNECTION LINES (drawn first, behind nodes) -->
  <!-- To Context (top-left) -->
  <path d="M264,130 Q220,90 145,72" fill="none" stroke="#7B61FF" stroke-width="1.5" opacity="0.3"/>
  <!-- To Reasoning (top) -->
  <path d="M300,114 L300,72" fill="none" stroke="#7B61FF" stroke-width="1.5" opacity="0.3"/>
  <!-- To Data (top-right) -->
  <path d="M336,130 Q380,90 455,72" fill="none" stroke="#A78BFA" stroke-width="1.5" opacity="0.3"/>
  <!-- To Tools (right) -->
  <path d="M344,158 L460,158" fill="none" stroke="#A78BFA" stroke-width="1.5" opacity="0.3"/>
  <!-- To Response (bottom-right) -->
  <path d="M336,186 Q380,226 455,244" fill="none" stroke="#7B61FF" stroke-width="1.5" opacity="0.3"/>
  <!-- To Memory (bottom) -->
  <path d="M300,202 L300,244" fill="none" stroke="#7B61FF" stroke-width="1.5" opacity="0.3"/>
  <!-- To Actions (bottom-left) -->
  <path d="M264,186 Q220,226 145,244" fill="none" stroke="#A78BFA" stroke-width="1.5" opacity="0.3"/>
  <!-- To Knowledge (left) -->
  <path d="M256,158 L140,158" fill="none" stroke="#A78BFA" stroke-width="1.5" opacity="0.3"/>

  <!-- Cross-connections between outer nodes (subtle) -->
  <path d="M145,86 Q160,120 140,145" fill="none" stroke="#7B61FF" stroke-width="0.5" opacity="0.08" stroke-dasharray="3 4"/>
  <path d="M455,86 Q440,120 460,145" fill="none" stroke="#7B61FF" stroke-width="0.5" opacity="0.08" stroke-dasharray="3 4"/>
  <path d="M460,172 Q440,210 455,232" fill="none" stroke="#7B61FF" stroke-width="0.5" opacity="0.08" stroke-dasharray="3 4"/>
  <path d="M140,172 Q160,210 145,232" fill="none" stroke="#7B61FF" stroke-width="0.5" opacity="0.08" stroke-dasharray="3 4"/>
  <path d="M168,244 Q250,265 280,256" fill="none" stroke="#7B61FF" stroke-width="0.5" opacity="0.08" stroke-dasharray="3 4"/>
  <path d="M432,244 Q350,265 320,256" fill="none" stroke="#7B61FF" stroke-width="0.5" opacity="0.08" stroke-dasharray="3 4"/>

  <!-- OUTER NODES -->

  <!-- Context (top-left) -->
  <g filter="url(#afShadow)">
    <rect x="85" y="50" width="100" height="40" rx="20" fill="white" stroke="#7B61FF" stroke-width="1.5"/>
  </g>
  <circle cx="106" cy="70" r="8" fill="#7B61FF" opacity="0.1"/>
  <g transform="translate(106,70)" fill="none" stroke="#7B61FF" stroke-width="1.3" stroke-linecap="round">
    <circle cx="0" cy="0" r="4"/>
    <path d="M0,-6 v-2 M0,6 v2 M-6,0 h-2 M6,0 h2"/>
  </g>
  <text x="148" y="74" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#7B61FF">Context</text>

  <!-- Reasoning (top-center) -->
  <g filter="url(#afShadow)">
    <rect x="245" y="44" width="110" height="40" rx="20" fill="white" stroke="#7B61FF" stroke-width="1.5"/>
  </g>
  <circle cx="268" cy="64" r="8" fill="#7B61FF" opacity="0.1"/>
  <g transform="translate(268,64)" fill="none" stroke="#7B61FF" stroke-width="1.3" stroke-linecap="round">
    <path d="M-4,-4 Q0,-7 4,-4 Q7,0 4,3 Q1,5 0,7"/>
    <circle cx="0" cy="9" r="0.5" fill="#7B61FF"/>
  </g>
  <text x="314" y="68" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#7B61FF">Reasoning</text>

  <!-- Data Sources (top-right) -->
  <g filter="url(#afShadow)">
    <rect x="405" y="50" width="100" height="40" rx="20" fill="white" stroke="#A78BFA" stroke-width="1.5"/>
  </g>
  <circle cx="426" cy="70" r="8" fill="#A78BFA" opacity="0.1"/>
  <g transform="translate(426,70)" fill="none" stroke="#A78BFA" stroke-width="1.3">
    <ellipse cx="0" cy="-2" rx="5" ry="2"/>
    <path d="M-5,-2 v5 c0,1.1 2.2,2 5,2 s5,-0.9 5,-2 v-5"/>
    <path d="M-5,1 c0,1.1 2.2,2 5,2 s5,-0.9 5,-2"/>
  </g>
  <text x="468" y="74" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#A78BFA">Data</text>

  <!-- Tools (right) -->
  <g filter="url(#afShadow)">
    <rect x="460" y="138" width="100" height="40" rx="20" fill="white" stroke="#A78BFA" stroke-width="1.5"/>
  </g>
  <circle cx="481" cy="158" r="8" fill="#A78BFA" opacity="0.1"/>
  <g transform="translate(481,158)" fill="none" stroke="#A78BFA" stroke-width="1.3" stroke-linecap="round">
    <path d="M-3,-5 L-3,1 L-5,3 L0,5 L5,3 L3,1 L3,-5"/>
    <line x1="-3" y1="-5" x2="3" y2="-5"/>
  </g>
  <text x="524" y="162" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#A78BFA">Tools</text>

  <!-- Response (bottom-right) -->
  <g filter="url(#afShadow)">
    <rect x="405" y="230" width="108" height="40" rx="20" fill="white" stroke="#7B61FF" stroke-width="1.5"/>
  </g>
  <circle cx="426" cy="250" r="8" fill="#7B61FF" opacity="0.1"/>
  <g transform="translate(426,250)" fill="none" stroke="#7B61FF" stroke-width="1.3" stroke-linecap="round">
    <path d="M-5,-4 h10 v6 h-7 l-3,3 v-3"/>
  </g>
  <text x="472" y="254" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#7B61FF">Response</text>

  <!-- Memory (bottom-center) -->
  <g filter="url(#afShadow)">
    <rect x="245" y="244" width="110" height="40" rx="20" fill="white" stroke="#7B61FF" stroke-width="1.5"/>
  </g>
  <circle cx="268" cy="264" r="8" fill="#7B61FF" opacity="0.1"/>
  <g transform="translate(268,264)" fill="none" stroke="#7B61FF" stroke-width="1.3" stroke-linecap="round">
    <rect x="-5" y="-4" width="10" height="8" rx="1"/>
    <line x1="-3" y1="-1" x2="3" y2="-1"/>
    <line x1="-3" y1="1" x2="1" y2="1"/>
  </g>
  <text x="314" y="268" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#7B61FF">Memory</text>

  <!-- Actions (bottom-left) -->
  <g filter="url(#afShadow)">
    <rect x="85" y="230" width="100" height="40" rx="20" fill="white" stroke="#A78BFA" stroke-width="1.5"/>
  </g>
  <circle cx="106" cy="250" r="8" fill="#A78BFA" opacity="0.1"/>
  <g transform="translate(106,250)" fill="none" stroke="#A78BFA" stroke-width="1.3" stroke-linecap="round">
    <polygon points="0,-5 2,-1 6,-1 3,2 4,6 0,4 -4,6 -3,2 -6,-1 -2,-1" fill="none"/>
  </g>
  <text x="148" y="254" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#A78BFA">Actions</text>

  <!-- Knowledge (left) -->
  <g filter="url(#afShadow)">
    <rect x="40" y="138" width="110" height="40" rx="20" fill="white" stroke="#A78BFA" stroke-width="1.5"/>
  </g>
  <circle cx="63" cy="158" r="8" fill="#A78BFA" opacity="0.1"/>
  <g transform="translate(63,158)" fill="none" stroke="#A78BFA" stroke-width="1.3" stroke-linecap="round">
    <path d="M-5,4 v-8 c0,-1 2,-2 5,-2 s5,1 5,2 v8"/>
    <path d="M-5,-2 c0,1 2,2 5,2 s5,-1 5,-2"/>
  </g>
  <text x="112" y="162" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#A78BFA">Knowledge</text>

  <!-- Small decorative dots at connection points -->
  <g fill="#7B61FF" opacity="0.4">
    <circle cx="264" cy="130" r="2"/>
    <circle cx="300" cy="114" r="2"/>
    <circle cx="336" cy="130" r="2"/>
    <circle cx="344" cy="158" r="2"/>
    <circle cx="336" cy="186" r="2"/>
    <circle cx="300" cy="202" r="2"/>
    <circle cx="264" cy="186" r="2"/>
    <circle cx="256" cy="158" r="2"/>
  </g>
</svg>