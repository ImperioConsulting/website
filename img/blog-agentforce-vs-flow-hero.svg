<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EEF2F7"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0057B8"/>
      <stop offset="100%" stop-color="#00A1E0"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B61FF"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0B1120" flood-opacity="0.08"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)" rx="8"/>

  <!-- Subtle grid pattern on left -->
  <g opacity="0.04" stroke="#0057B8" stroke-width="1">
    <line x1="60" y1="60" x2="60" y2="340"/>
    <line x1="120" y1="60" x2="120" y2="340"/>
    <line x1="180" y1="60" x2="180" y2="340"/>
    <line x1="240" y1="60" x2="240" y2="340"/>
    <line x1="300" y1="60" x2="300" y2="340"/>
    <line x1="40" y1="80" x2="340" y2="80"/>
    <line x1="40" y1="140" x2="340" y2="140"/>
    <line x1="40" y1="200" x2="340" y2="200"/>
    <line x1="40" y1="260" x2="340" y2="260"/>
    <line x1="40" y1="320" x2="340" y2="320"/>
  </g>

  <!-- LEFT SIDE: Structured Flowchart (Flow) -->
  <!-- Title -->
  <text x="190" y="52" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0057B8" letter-spacing="0.5">SALESFORCE FLOW</text>
  <text x="190" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7B8D" letter-spacing="1">RULES-BASED</text>

  <!-- Start node -->
  <rect x="150" y="88" width="80" height="32" rx="16" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="190" y="109" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="white">Start</text>

  <!-- Arrow down -->
  <line x1="190" y1="120" x2="190" y2="142" stroke="#0057B8" stroke-width="2" stroke-linecap="round"/>
  <polygon points="190,148 185,140 195,140" fill="#0057B8"/>

  <!-- Decision diamond -->
  <g filter="url(#shadow)">
    <polygon points="190,150 240,185 190,220 140,185" fill="white" stroke="#0057B8" stroke-width="2"/>
  </g>
  <text x="190" y="182" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#0057B8">If/Then</text>
  <text x="190" y="194" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#6B7B8D">Decision</text>

  <!-- Left branch (Yes) -->
  <line x1="140" y1="185" x2="80" y2="185" stroke="#0057B8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="80" y1="185" x2="80" y2="248" stroke="#0057B8" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="80,254 75,246 85,246" fill="#0057B8"/>
  <text x="108" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#0057B8" font-weight="600">Yes</text>

  <!-- Right branch (No) -->
  <line x1="240" y1="185" x2="300" y2="185" stroke="#00A1E0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="300" y1="185" x2="300" y2="248" stroke="#00A1E0" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="300,254 295,246 305,246" fill="#00A1E0"/>
  <text x="268" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#00A1E0" font-weight="600">No</text>

  <!-- Action A -->
  <rect x="40" y="256" width="80" height="32" rx="6" fill="white" stroke="#0057B8" stroke-width="2" filter="url(#shadow)"/>
  <text x="80" y="277" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#0057B8">Action A</text>

  <!-- Action B -->
  <rect x="260" y="256" width="80" height="32" rx="6" fill="white" stroke="#00A1E0" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="277" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#00A1E0">Action B</text>

  <!-- Converge arrows -->
  <line x1="80" y1="288" x2="80" y2="318" stroke="#0057B8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="80" y1="318" x2="160" y2="318" stroke="#0057B8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="300" y1="288" x2="300" y2="318" stroke="#00A1E0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="300" y1="318" x2="220" y2="318" stroke="#00A1E0" stroke-width="1.5" stroke-linecap="round"/>

  <!-- End node -->
  <line x1="190" y1="318" x2="190" y2="332" stroke="#0057B8" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="190,338 185,330 195,330" fill="#0057B8"/>
  <rect x="155" y="340" width="70" height="28" rx="14" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="190" y="359" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="white">Output</text>

  <!-- CENTER DIVIDER -->
  <line x1="400" y1="50" x2="400" y2="350" stroke="#0B1120" stroke-width="1" stroke-dasharray="4 4" opacity="0.15"/>
  <circle cx="400" cy="200" r="28" fill="#0B1120" opacity="0.9"/>
  <text x="400" y="205" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800" fill="white" letter-spacing="1">VS</text>

  <!-- RIGHT SIDE: AI Neural/Brain (Agentforce) -->
  <!-- Title -->
  <text x="610" y="52" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#7B61FF" letter-spacing="0.5">AGENTFORCE</text>
  <text x="610" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B7B8D" letter-spacing="1">AI REASONING</text>

  <!-- Central brain/AI node -->
  <circle cx="610" cy="200" r="48" fill="white" stroke="#7B61FF" stroke-width="2.5" filter="url(#shadow)"/>
  <circle cx="610" cy="200" r="36" fill="#7B61FF" opacity="0.08"/>
  <!-- Brain icon (simplified) -->
  <g transform="translate(610,200)" fill="none" stroke="#7B61FF" stroke-width="2" stroke-linecap="round">
    <path d="M-2,-18 C-12,-18 -18,-12 -18,-4 C-18,0 -16,3 -14,5 C-18,8 -19,14 -14,18 C-10,22 -4,20 -2,18"/>
    <path d="M2,-18 C12,-18 18,-12 18,-4 C18,0 16,3 14,5 C18,8 19,14 14,18 C10,22 4,20 2,18"/>
    <line x1="0" y1="-18" x2="0" y2="18"/>
    <path d="M-14,0 Q0,-6 14,0" opacity="0.6"/>
    <path d="M-12,10 Q0,4 12,10" opacity="0.6"/>
  </g>

  <!-- Orbiting nodes with connections -->
  <!-- Top: Context -->
  <line x1="610" y1="152" x2="610" y2="108" stroke="#7B61FF" stroke-width="1.5" opacity="0.4"/>
  <circle cx="610" cy="100" r="22" fill="white" stroke="#7B61FF" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="610" y="104" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#7B61FF">Context</text>

  <!-- Top-right: Data -->
  <line x1="644" y1="168" x2="695" y2="120" stroke="#A78BFA" stroke-width="1.5" opacity="0.4"/>
  <circle cx="705" cy="112" r="22" fill="white" stroke="#A78BFA" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="705" y="116" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#A78BFA">Data</text>

  <!-- Right: Tools -->
  <line x1="658" y1="200" x2="710" y2="200" stroke="#7B61FF" stroke-width="1.5" opacity="0.4"/>
  <circle cx="730" cy="200" r="22" fill="white" stroke="#7B61FF" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="730" y="204" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#7B61FF">Tools</text>

  <!-- Bottom-right: Actions -->
  <line x1="644" y1="232" x2="695" y2="280" stroke="#A78BFA" stroke-width="1.5" opacity="0.4"/>
  <circle cx="705" cy="290" r="22" fill="white" stroke="#A78BFA" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="705" y="294" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#A78BFA">Actions</text>

  <!-- Bottom: Response -->
  <line x1="610" y1="248" x2="610" y2="300" stroke="#7B61FF" stroke-width="1.5" opacity="0.4"/>
  <circle cx="610" cy="318" r="22" fill="white" stroke="#7B61FF" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="610" y="322" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#7B61FF">Response</text>

  <!-- Bottom-left: Memory -->
  <line x1="576" y1="232" x2="525" y2="280" stroke="#A78BFA" stroke-width="1.5" opacity="0.4"/>
  <circle cx="515" cy="290" r="22" fill="white" stroke="#A78BFA" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="515" y="294" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#A78BFA">Memory</text>

  <!-- Left: Knowledge -->
  <line x1="562" y1="200" x2="510" y2="200" stroke="#7B61FF" stroke-width="1.5" opacity="0.4"/>
  <circle cx="490" cy="200" r="22" fill="white" stroke="#7B61FF" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="490" y="196" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600" fill="#7B61FF">Know-</text>
  <text x="490" y="207" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600" fill="#7B61FF">ledge</text>

  <!-- Top-left: Goals -->
  <line x1="576" y1="168" x2="525" y2="120" stroke="#A78BFA" stroke-width="1.5" opacity="0.4"/>
  <circle cx="515" cy="112" r="22" fill="white" stroke="#A78BFA" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="515" y="116" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#A78BFA">Goals</text>

  <!-- Decorative pulse rings around brain -->
  <circle cx="610" cy="200" r="56" fill="none" stroke="#7B61FF" stroke-width="0.5" opacity="0.15"/>
  <circle cx="610" cy="200" r="68" fill="none" stroke="#7B61FF" stroke-width="0.5" opacity="0.08"/>

  <!-- Secondary connections between outer nodes -->
  <path d="M610,78 Q660,85 683,92" fill="none" stroke="#7B61FF" stroke-width="0.5" opacity="0.12" stroke-dasharray="3 3"/>
  <path d="M727,200 Q720,245 705,268" fill="none" stroke="#7B61FF" stroke-width="0.5" opacity="0.12" stroke-dasharray="3 3"/>
  <path d="M683,308 Q650,320 632,318" fill="none" stroke="#7B61FF" stroke-width="0.5" opacity="0.12" stroke-dasharray="3 3"/>
  <path d="M588,318 Q560,310 537,308" fill="none" stroke="#7B61FF" stroke-width="0.5" opacity="0.12" stroke-dasharray="3 3"/>
  <path d="M493,200 Q500,155 515,134" fill="none" stroke="#7B61FF" stroke-width="0.5" opacity="0.12" stroke-dasharray="3 3"/>
  <path d="M537,92 Q558,82 588,80" fill="none" stroke="#7B61FF" stroke-width="0.5" opacity="0.12" stroke-dasharray="3 3"/>
</svg>