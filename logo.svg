<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" width="280" height="60">
  <defs>
    <linearGradient id="accent-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0057B8"/>
      <stop offset="100%" stop-color="#00A1E0"/>
    </linearGradient>
  </defs>

  <!-- GI Monogram -->
  <g transform="translate(0, 5)">
    <!-- Outer square frame -->
    <rect x="2" y="2" width="46" height="46" rx="8" fill="none" stroke="url(#accent-line)" stroke-width="2.5"/>

    <!-- G letter -->
    <text x="10" y="37"
          font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="30" font-weight="800" letter-spacing="-2"
          fill="#0B1120">G</text>

    <!-- I letter with accent color -->
    <text x="29" y="37"
          font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="30" font-weight="800" letter-spacing="-2"
          fill="#0057B8">I</text>
  </g>

  <!-- Company Name -->
  <g transform="translate(62, 5)">
    <!-- GROUP -->
    <text x="0" y="20"
          font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="14" font-weight="500" letter-spacing="4"
          fill="#94A3B8">GROUP</text>

    <!-- IMPERIO -->
    <text x="0" y="42"
          font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
          font-size="26" font-weight="800" letter-spacing="2"
          fill="#0B1120">IMPERIO</text>
  </g>
</svg>
